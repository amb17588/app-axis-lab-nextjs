name = "appaxislab"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Secrets (RESEND_API_KEY, RESEND_FROM, RESEND_TO) are set in the Cloudflare
# dashboard under Workers & Pages → appaxislab-next → Settings → Variables & Secrets.
# Never put secret values in this file.
