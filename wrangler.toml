name = "appaxislab"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"

[build]
command = "npm run build:cf"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Secrets (RESEND_API_KEY, RESEND_FROM, RESEND_TO) are set in the Cloudflare
# dashboard under Workers & Pages → appaxislab → Settings → Variables & Secrets.
# Never put secret values in this file.

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
